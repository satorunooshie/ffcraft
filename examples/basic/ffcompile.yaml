version: v1

variant_sets:
  boolean:
    on: true
    off: false
  checkout_mode:
    control: control
    treatment_a: treatment_a
    treatment_b: treatment_b

rules:
  internal_ios:
    all_of:
      - eq:
          - { var: user.type }
          - internal
      - eq:
          - { var: device.platform }
          - ios
  premium_ios:
    all_of:
      - eq:
          - { var: user.plan }
          - premium
      - eq:
          - { var: device.platform }
          - ios

distributions:
  checkout_ab:
    stickiness: user.id
    allocations:
      control: 80
      treatment_a: 10
      treatment_b: 10

flags:
  - key: enable-new-home
    variant_set: boolean
    default_variant: off
    environments:
      prod:
        rules:
          - if:
              rule: internal_ios
            serve: on
        default_action:
          serve: off

  - key: checkout-experiment
    variant_set: checkout_mode
    default_variant: control
    environments:
      prod:
        rules:
          - if:
              rule: premium_ios
            distribute: checkout_ab
        default_action:
          serve: control
