version: v1

variant_sets:
  boolean:
    on: true
    off: false

flags:
  - key: collection-string-ops
    variant_set: boolean
    default_variant: off
    environments:
      prod:
        rules:
          - if:
              all_of:
                - in:
                    - { var: user.country }
                    - [JP, US]
                - contains:
                    - { var: user.tags }
                    - beta
                - starts_with:
                    - { var: user.email }
                    - dev@
                - ends_with:
                    - { var: user.email }
                    - "@example.com"
            serve: on
        default_action:
          serve: off
