version: v1

variant_sets:
  boolean:
    on: true
    off: false

flags:
  - key: semver-logical-ops
    variant_set: boolean
    default_variant: off
    environments:
      prod:
        rules:
          - if:
              any_of:
                - all_of:
                    - semver_gte:
                        - { var: user.app_version }
                        - 2.1.0
                    - eq:
                        - { var: user.plan }
                        - premium
                - not:
                    eq:
                      - { var: user.plan }
                      - free
            serve: on
        default_action:
          serve: off
