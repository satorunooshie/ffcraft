version: v1

variant_sets:
  boolean:
    on: true
    off: false
  checkout_mode:
    control: control
    treatment_1: treatment_1

flags:
  - key: enable-new-home
    variant_set: boolean
    default_variant: off
    environments:
      prod:
        rules:
          - if:
              eq:
                - { var: user.id }
                - 1
            serve: on
        default_action:
          serve: off

  - key: checkout-mode
    variant_set: checkout_mode
    default_variant: control
    environments:
      prod:
        rules:
          - if:
              eq:
                - { var: device.platform }
                - ios
            serve: treatment_1
          - if:
              semver_gte:
                - { var: app.version }
                - 2.0.0
            serve: treatment_1
        default_action:
          serve: control
